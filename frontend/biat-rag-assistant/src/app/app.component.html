<section class="auth-shell" *ngIf="!authService.isAuthenticated(); else appShell">
  <header class="auth-shell__header">
    <div class="brand-lockup">
      <div class="biat-logo" aria-hidden="true">
        <svg viewBox="0 0 120 120" role="img" aria-label="BIAT logo">
          <rect width="120" height="120" rx="14" fill="#0f5b8a"></rect>
          <path d="M24 84C42 84 50 73 58 61L82 27H98L74 61C65 74 54 84 37 84H24Z" fill="#f6a400"></path>
          <path d="M34 84C50 84 58 74 66 64L89 31" fill="none" stroke="#d97a00" stroke-width="8" stroke-linecap="round"></path>
        </svg>
      </div>
      <div>
        <p class="eyebrow">BIAT Assistant</p>
        <h1>{{ title }}</h1>
      </div>
    </div>

    <button type="button" class="auth-link" (click)="toggleAuthMode()">
      {{ showRegister ? 'Have an account?' : 'Create account' }}
    </button>
  </header>

  <div class="auth-shell__body">
    <app-login *ngIf="!showRegister" (authenticated)="onAuthenticated()"></app-login>
    <app-register *ngIf="showRegister" (authenticated)="onAuthenticated()"></app-register>
  </div>
</section>

<ng-template #appShell>
  <section class="app-shell">
    <app-sidebar
      [conversations]="conversations"
      [activeConversationId]="activeConversationId"
      (conversationSelected)="selectConversation($event)"
      (newChat)="createConversation()"
      (logout)="logout()"
    ></app-sidebar>

    <app-chat></app-chat>
  </section>
</ng-template>
